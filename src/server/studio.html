<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><title>YiFrame Studio</title><style>body{font-family:PingFang SC,Microsoft YaHei,Noto Sans CJK SC,Source Han Sans SC,sans-serif;margin:20px}.row{margin:8px 0}iframe{width:360px;height:640px;border:1px solid #ddd}button{margin-right:8px}</style></head><body>
<h1>YiFrame / 影页 Studio</h1>
<div class="row">模板: <select id="template"></select></div>
<div class="row"><input id="title" placeholder="中文标题"/></div><div class="row"><input id="subtitle" placeholder="副标题"/></div><div class="row"><textarea id="bullets" placeholder="每行一个卖点"></textarea></div><div class="row"><input id="cta" placeholder="CTA 文案"/></div>
<div class="row">比例 <select id="ratio"><option>9:16</option><option>16:9</option><option>1:1</option></select> 时长 <select id="duration"><option>10</option><option selected>15</option><option>30</option></select></div>
<div class="row"><button id="preview">预览</button><button id="render">渲染 MP4</button><span id="status"></span></div>
<div class="row"><button id="play">播放</button><button id="pause">暂停</button><button id="restart">重播</button><input type="range" min="0" max="100" value="0" id="timeline"/></div>
<pre id="meta"></pre><iframe id="pv"></iframe>
<script>
const t=document.getElementById('template'),pv=document.getElementById('pv'),meta=document.getElementById('meta'),status=document.getElementById('status');
fetch('/api/templates').then(r=>r.json()).then(list=>{list.forEach(i=>{const o=document.createElement('option');o.value=i;o.textContent=i;t.appendChild(o)});loadMeta();preview();});
function loadMeta(){fetch('/api/meta?template='+t.value).then(r=>r.json()).then(m=>meta.textContent=`模板: ${t.value}\nwidth: ${m.width}\nheight: ${m.height}\nfps: ${m.fps}\nduration: ${m.duration}\naspect ratio: ${m.aspectRatio}`)}
function preview(){pv.src='/examples/'+t.value+'/index.html?ts='+Date.now();loadMeta()}
document.getElementById('preview').onclick=preview;
document.getElementById('render').onclick=async()=>{status.textContent='渲染中...';const r=await fetch('/api/render',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({template:t.value})});const j=await r.json();status.textContent=j.ok?('完成: '+j.output):('失败: '+j.message)};
document.getElementById('play').onclick=()=>pv.contentWindow?.postMessage({type:'play'},'*');document.getElementById('pause').onclick=()=>pv.contentWindow?.postMessage({type:'pause'},'*');document.getElementById('restart').onclick=()=>pv.contentWindow?.postMessage({type:'restart'},'*');document.getElementById('timeline').oninput=(e)=>pv.contentWindow?.postMessage({type:'seek',value:e.target.value},'*');
</script></body></html>
